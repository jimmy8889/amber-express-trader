name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Extract and validate version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Tag: $TAG"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(rc[0-9]+)?$ ]]; then
            echo "::error::Release tag '$TAG' does not match expected format (vX.Y.Z or vX.Y.Zrc#)"
            exit 1
          fi

      - name: Check pyproject.toml version matches tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          PYPROJECT_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "Version: $VERSION"
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          if [[ "$VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "::error::Tag version ($VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi

      - name: Check manifest.json version matches tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          MANIFEST_VERSION=$(jq -r '.version' custom_components/amber_express_trader/manifest.json)
          echo "Version: $VERSION"
          echo "manifest.json version: $MANIFEST_VERSION"
          if [[ "$VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "::error::Tag version ($VERSION) does not match manifest.json version ($MANIFEST_VERSION)"
            exit 1
          fi

  upload-assets:
    name: Upload release assets
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7

      - name: Create release package
        run: |
          cd custom_components/amber_express_trader
          zip -r ../../amber_express_trader.zip . \
            --exclude "tests/" "tests/*" "*/tests/" "*/tests/*" \
            --exclude "*/__pycache__/" "*/__pycache__/*"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            amber_express_trader.zip
